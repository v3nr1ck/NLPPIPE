<!doctype html>
<html lang="en" data-bs-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}CMMS Pipeline{% endblock %} — CMMS NLP Pipeline</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="/static/style.css">
  <script src="https://unpkg.com/htmx.org@1.9.12" defer></script>
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark px-3 shadow-sm">
  <a class="navbar-brand fw-bold" href="/">
    <span class="text-warning">⬡</span> CMMS Pipeline
  </a>
  <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navmenu">
    <span class="navbar-toggler-icon"></span>
  </button>
  <div class="collapse navbar-collapse" id="navmenu">
    <ul class="navbar-nav ms-3 gap-1">
      <li class="nav-item">
        <a class="nav-link {% if page == 'studio' %}active fw-semibold{% endif %}" href="/studio">
          🗂 Field Mapping Studio
        </a>
      </li>
      <li class="nav-item">
        <a class="nav-link {% if page == 'simulator' %}active fw-semibold{% endif %}" href="/simulator">
          ▶ Work Order Simulator
        </a>
      </li>
      <li class="nav-item">
        <a class="nav-link {% if page == 'rules' %}active fw-semibold{% endif %}" href="/rules">
          📋 Rules Manager
        </a>
      </li>
    </ul>
    <div class="ms-auto d-flex align-items-center gap-3">
      <span class="badge bg-secondary">mock engine</span>
      <span class="text-muted small">v1.3.1</span>
    </div>
  </div>
</nav>

<main class="py-4 px-3 px-lg-4">
  {% block content %}{% endblock %}
</main>

<footer class="text-center text-muted small py-3 border-top mt-auto">
  CMMS NLP Pipeline · Logic Sandwich Architecture · <a href="/rules" class="text-muted">Rules Manager</a>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
